# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    restart: always
    environment:
      NODE_ENV: production

  db:
    ports: []
    restart: always
    environment:
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=50
        -c random_page_cost=1.1
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c log_min_duration_statement=1000

  redis:
    ports: []
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save 60 1000

  seeder:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - seed-data:/app/data/extracted
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-homeoclinic}
    profiles:
      - seed

volumes:
  seed-data:
