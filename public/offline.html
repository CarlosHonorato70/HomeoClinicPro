<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeoClinic Pro — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 420px;
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 1.5rem;
      background: rgba(20, 184, 166, 0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; color: #14b8a6; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    h1 span { color: #14b8a6; }
    p { color: #9ca3af; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1rem; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(20, 184, 166, 0.1);
      border: 1px solid rgba(20, 184, 166, 0.2);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: #14b8a6;
      margin-bottom: 2rem;
    }
    .tips {
      text-align: left;
      background: #111118;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1.25rem;
      margin-top: 1.5rem;
    }
    .tips h3 { font-size: 0.85rem; margin-bottom: 0.75rem; color: #d1d5db; }
    .tips li {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-bottom: 0.4rem;
      list-style: none;
      padding-left: 1.2rem;
      position: relative;
    }
    .tips li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #14b8a6;
    }
    .retry {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 10px 24px;
      background: #14b8a6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .retry:hover { background: #0d9488; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M12 9v4m0 4h.01"/>
      </svg>
    </div>
    <div class="badge">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Sem conexao
    </div>
    <h1>Homeo<span>Clinic</span> Pro</h1>
    <p>Voce esta sem conexao com a internet. Alguns dados podem estar disponiveis em cache.</p>

    <div class="tips">
      <h3>Dados disponiveis offline:</h3>
      <ul>
        <li>Repertorio (capitulos e remedios)</li>
        <li>Paginas visitadas recentemente</li>
        <li>Agendamentos do dia (se acessados)</li>
      </ul>
    </div>

    <a href="/" class="retry" onclick="location.reload(); return false;">
      Tentar Reconectar
    </a>
  </div>
</body>
</html>
