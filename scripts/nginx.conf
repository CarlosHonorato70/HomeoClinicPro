# HomeoClinic Pro — Nginx reverse proxy
# Install: sudo cp scripts/nginx.conf /etc/nginx/sites-available/homeoclinic
#          sudo ln -sf /etc/nginx/sites-available/homeoclinic /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

upstream homeoclinic {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Certbot will add HTTPS redirect here
    # For now, proxy to app (Cloudflare handles SSL)
    location / {
        proxy_pass http://homeoclinic;
        include /etc/nginx/proxy_params;
    }

    # Health check (no rate limit)
    location = /api/health {
        proxy_pass http://homeoclinic;
        include /etc/nginx/proxy_params;
        access_log off;
    }

    # Auth endpoints — stricter rate limit
    location ~ ^/api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://homeoclinic;
        include /etc/nginx/proxy_params;
    }

    # API endpoints — standard rate limit
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://homeoclinic;
        include /etc/nginx/proxy_params;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://homeoclinic;
        include /etc/nginx/proxy_params;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # WebSocket support (HMR in dev, SSE in production)
    location /_next/webpack-hmr {
        proxy_pass http://homeoclinic;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # Client limits
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Proxy params (inline if /etc/nginx/proxy_params doesn't exist)
    # These are included via the proxy_params file on Ubuntu
}

